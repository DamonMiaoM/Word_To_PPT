<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 题目转换 B-v1.2.1 (纯净导出版)</title>
    <script src="jszip.min.js"></script>
    <script src="pptxgen.bundle.js"></script>
    <style>
        :root { --primary: #2b579a; --bg: #f3f4f6; }
        body { font-family: "Microsoft YaHei", sans-serif; background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .main-card { background: white; width: 500px; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; }
        .upload-zone { border: 2px dashed #cbd5e1; background: #f8fafc; padding: 50px 20px; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .upload-zone:hover { border-color: var(--primary); background: #f0f7ff; }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 14px; color: #64748b; min-height: 1.5em; }
    </style>
</head>
<body>

<div class="main-card">
    <h2 style="color: var(--primary); margin-top: 0;">AI 题目转换器</h2>
    <p style="color: #666; font-size: 14px; margin-bottom: 30px;">视觉布局 B 方案 · 2026 高速版</p>
    
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div style="font-size: 40px; margin-bottom: 10px;">📄</div>
        <b id="fileDesc">点击或拖拽上传 Word 文档</b>
        <input type="file" id="fileInput" accept=".docx" hidden>
    </div>
    
    <button id="exportBtn" disabled>生成并导出 PPTX</button>
    <div id="status">等待上传文件...</div>
</div>

<script>
let finalSlides = [];

const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.stopPropagation();
    uploadZone.style.borderColor = 'var(--primary)';
    uploadZone.style.background = '#f0f7ff';
});
uploadZone.addEventListener('dragleave', () => {
    uploadZone.style.borderColor = '';
    uploadZone.style.background = '';
});
uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    e.stopPropagation();
    uploadZone.style.borderColor = '';
    uploadZone.style.background = '';
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
});

async function handleFile(file) {
    if (!file) return;

    document.getElementById('fileDesc').innerText = file.name;
    const status = document.getElementById('status');
    status.innerHTML = "⏳ 正在解析文档内容与媒体资源...";

    const reader = new FileReader();
    reader.onload = async (event) => {
        try {
            const zip = await JSZip.loadAsync(event.target.result);
            
            // 1. 提取图片资源映射
            const mediaMap = {};
            const mediaFiles = zip.filter(path => path.startsWith("word/media/"));
            for (let f of mediaFiles) {
                const b64 = await f.async("base64");
                const ext = f.name.split('.').pop().toLowerCase();
                const fileName = f.name.split('/').pop();
                mediaMap[fileName] = `data:image/${ext === 'jpg' ? 'jpeg' : 'png'};base64,${b64}`;
            }

            // 2. 解析图片关系 ID
            const ridMap = {};
            const relsFile = await zip.file("word/_rels/document.xml.rels").async("string");
            const relsXml = new DOMParser().parseFromString(relsFile, "text/xml");
            Array.from(relsXml.getElementsByTagName("Relationship")).forEach(rel => {
                ridMap[rel.getAttribute("Id")] = rel.getAttribute("Target").split('/').pop();
            });

            // 3. 解析主文档 XML
            const docXmlStr = await zip.file("word/document.xml").async("string");
            const docXml = new DOMParser().parseFromString(docXmlStr, "text/xml");
            const paragraphs = Array.from(docXml.getElementsByTagName("w:p"));

            finalSlides = [];
            let currentSlide = null;
            let currentSectionLabel = '选择题'; // 当前大题类型标签

            // 大题标题：汉字序号（一、二、三…），只更新标签、不生成 slide
            const sectionRegex = /^[一二三四五六七八九十]+[、，\s]/;
            // 小题题号：阿拉伯数字（1、1. 1) 等），生成 slide
            const questionRegex = /^\d+[\.、\s\)\．]/;

            paragraphs.forEach(p => {
                const text = Array.from(p.getElementsByTagName("w:t")).map(t => t.textContent).join("").trim();

                // 提取段落中的图片
                const imgRids = Array.from(p.getElementsByTagName("v:imagedata")).map(i => i.getAttribute("r:id"))
                                .concat(Array.from(p.getElementsByTagName("a:blip")).map(i => i.getAttribute("r:embed")));
                const segmentImages = imgRids.map(rid => mediaMap[ridMap[rid]]).filter(src => src);

                const isOptionLine  = /^[A-D][\.、\s\)\.]/.test(text);
                const isImageOnly   = text === '' && segmentImages.length > 0;
                const isSubstantial = text.length > 5 && !isOptionLine;
                const bodyStr       = currentSlide ? currentSlide.body.join('\n') : '';
                const seenAllOpts   = currentSlide && /D[\.、]/.test(bodyStr);

                if (sectionRegex.test(text)) {
                    // 大题标题：解析题型名称，更新标签，不创建 slide
                    const m = text.match(/^[一二三四五六七八九十]+[、，\s]*(.+?)$/);
                    if (m) {
                        const raw = m[1].replace(/[。、，\s]/g, '');
                        if      (raw.includes('选择')) currentSectionLabel = '选择题';
                        else if (raw.includes('计算')) currentSectionLabel = '计算题';
                        else if (raw.includes('填空')) currentSectionLabel = '填空题';
                        else if (raw.includes('判断')) currentSectionLabel = '判断题';
                        else if (raw.includes('解答') || raw.includes('应用')) currentSectionLabel = '解答题';
                        else currentSectionLabel = raw || '解答题';
                    }
                    if (currentSlide) { finalSlides.push(currentSlide); currentSlide = null; }
                } else if (questionRegex.test(text)) {
                    // 小题题号 → 新 slide
                    if (currentSlide) finalSlides.push(currentSlide);
                    currentSlide = { title: text, body: [], images: [...segmentImages], section: currentSectionLabel };
                } else if (currentSlide && seenAllOpts && (isSubstantial || isImageOnly)) {
                    // ABCD 已齐，遇到新内容 → 自动切换新 slide
                    finalSlides.push(currentSlide);
                    currentSlide = {
                        title: isSubstantial ? text : '',
                        body: [],
                        images: [...segmentImages],
                        section: currentSectionLabel
                    };
                } else if (currentSlide) {
                    if (!currentSlide.title && isSubstantial) {
                        currentSlide.title = text;
                        if (segmentImages.length > 0) currentSlide.images.push(...segmentImages);
                    } else {
                        if (text) {
                            const fmt = text.replace(/([A-D][\.、\s\)\．])/g, '\n$1').trim();
                            currentSlide.body.push(fmt);
                        }
                        if (segmentImages.length > 0) currentSlide.images.push(...segmentImages);
                    }
                }
            });
            if (currentSlide) finalSlides.push(currentSlide);

            // ── 后处理：复杂多图题拆分为主题干 + 各小题 ──
            // 检测含 (1)(2) 小题标记且图片 ≥ 2 的题目，拆成独立 slide
            const subQReg = /^[\(（][1-9][\)）]/;
            finalSlides = finalSlides.flatMap(s => {
                if (s.images.length < 2) return [s];
                const subStarts = s.body.reduce((acc, item, i) => {
                    if (subQReg.test(item.trim())) acc.push(i);
                    return acc;
                }, []);
                if (subStarts.length < 2) return [s]; // 小题不足2道，不拆
                // 主题干 slide（含全部图片）
                const result = [{ ...s, body: s.body.slice(0, subStarts[0]) }];
                // 各小题 slide（无图，全宽文字）
                for (let i = 0; i < subStarts.length; i++) {
                    const end = subStarts[i + 1] || s.body.length;
                    result.push({
                        title: s.title, section: s.section,
                        body: s.body.slice(subStarts[i], end),
                        images: [], isSub: true
                    });
                }
                return result;
            });

            status.innerHTML = `✅ 解析完成：共识别到 ${finalSlides.length} 道题目`;
            document.getElementById('exportBtn').disabled = false;
        } catch (err) {
            status.innerHTML = `<span style="color:red">❌ 解析故障: ${err.message}</span>`;
        }
    };
    reader.readAsArrayBuffer(file);
}

document.getElementById('fileInput').onchange = (e) => {
    handleFile(e.target.files[0]);
};

document.getElementById('exportBtn').onclick = () => {
    const pptx = new PptxGenJS();
    pptx.layout = 'LAYOUT_WIDE';

    finalSlides.forEach((s, idx) => {
        const slide = pptx.addSlide();
        const hasImg = s.images && s.images.length > 0;
        const contentW = hasImg ? 7.8 : 12.5;

        // ── 顶部浅蓝色标题栏 ──
        slide.addShape(pptx.ShapeType.rect, {
            x: 0, y: 0, w: 13.33, h: 0.62,
            fill: { color: 'd6e8f7' }, line: { color: 'd6e8f7' }
        });

        // 提取题号（支持 1. / 1、/ 一、等格式）
        const numMatch = s.title.match(/^(\d+)|^([一二三四五六七八九十百]+)/);
        const qNum = numMatch ? (numMatch[1] || numMatch[2]) : String(idx + 1);

        // "第 X 题" 标题（小题时加「续」标记）
        slide.addText(`第 ${qNum} 题${s.isSub ? ' · 续' : ''}`, {
            x: 0.3, y: 0.07, w: 4, h: 0.48,
            fontSize: 20, color: '1a4a8a', bold: true, valign: 'middle'
        });

        // 右上角题型标签（动态）
        slide.addText(`— ${s.section || '解答题'}`, {
            x: 10.8, y: 0.07, w: 2.2, h: 0.48,
            fontSize: 11, color: '7a9bbf', align: 'right', valign: 'middle'
        });

        // 分割选项与非选项内容，选项短时水平排列
        function buildBodyText(body) {
            const lines = body.join('\n').split('\n').map(l => l.trim()).filter(Boolean);
            const optLines    = lines.filter(l =>  /^[A-D][\.、\s\)\.]/.test(l));
            const nonOptLines = lines.filter(l => !/^[A-D][\.、\s\)\.]/.test(l));
            if (optLines.length === 0) return lines.join('\n');
            const optStr = optLines.map(l => l.replace(/\s+/g, '')).join('').length < 52
                ? optLines.join('    ')   // 水平排列
                : optLines.join('\n');    // 垂直排列
            return [...nonOptLines, optStr].filter(Boolean).join('\n');
        }

        // 标题栏下分隔线
        slide.addShape(pptx.ShapeType.line, {
            x: 0, y: 0.62, w: 13.33, h: 0,
            line: { color: 'b8d4ee', width: 0.5 }
        });

        const FONT     = '微软雅黑';
        const FONT_SIZE = 28;
        const LINE_SP   = 40;

        if (hasImg) {
            // ── 有图片：左侧题干+选项，右侧图片网格 ──
            const bodyText = buildBodyText(s.body);
            const parts = [
                { text: s.title, options: { fontFace: FONT, fontSize: FONT_SIZE, bold: true,  color: '1a1a1a', breakLine: !!bodyText } }
            ];
            if (bodyText) {
                parts.push({ text: bodyText, options: { fontFace: FONT, fontSize: FONT_SIZE, bold: false, color: '222222' } });
            }
            slide.addText(parts, {
                x: 0.4, y: 0.80, w: 7.0, h: 6.45,
                valign: 'top', autoFit: true, lineSpacing: LINE_SP
            });
            // 多图网格：1图→居中，2图→竖排，3-4图→2×2
            const imgs = s.images.slice(0, 4);
            const gx = 7.7, gy = 1.0, gw = 5.3, gh = 5.8;
            if (imgs.length === 1) {
                slide.addImage({ data: imgs[0], x: gx, y: gy, w: gw, h: gh,
                    sizing: { type: 'contain', w: gw, h: gh } });
            } else if (imgs.length === 2) {
                const rh = (gh - 0.15) / 2;
                imgs.forEach((img, i) => slide.addImage({ data: img,
                    x: gx, y: gy + i * (rh + 0.15), w: gw, h: rh,
                    sizing: { type: 'contain', w: gw, h: rh } }));
            } else {
                const cw = (gw - 0.15) / 2, ch = (gh - 0.15) / 2;
                imgs.forEach((img, i) => slide.addImage({ data: img,
                    x: gx + (i % 2) * (cw + 0.15),
                    y: gy + Math.floor(i / 2) * (ch + 0.15),
                    w: cw, h: ch,
                    sizing: { type: 'contain', w: cw, h: ch } }));
            }
        } else {
            // ── 无图片：题干+选项紧凑排列 ──
            const bodyText = buildBodyText(s.body);
            const parts = [
                { text: s.title, options: { fontFace: FONT, fontSize: FONT_SIZE, bold: true,  color: '1a1a1a', breakLine: !!bodyText } }
            ];
            if (bodyText) {
                parts.push({ text: bodyText, options: { fontFace: FONT, fontSize: FONT_SIZE, bold: false, color: '222222' } });
            }
            slide.addText(parts, {
                x: 0.4, y: 0.80, w: 12.6, h: 6.45,
                valign: 'top', autoFit: true, lineSpacing: LINE_SP
            });
        }

        // ── 底部页码 ──
        slide.addText(String(idx + 1), {
            x: 0.3, y: 7.15, w: 0.6, h: 0.25,
            fontSize: 10, color: '9aabbf'
        });
    });

    const fileName = `PPT导出_${new Date().getTime()}.pptx`;
    pptx.writeFile({ fileName }).then(() => {
        document.getElementById('status').innerText = "🎉 文件下载已启动！";
    });
};
</script>
</body>
</html>
